name: Publish Release

on:
  push:
    tags:
      - "*-v*"          # 匹配 1.GitHub版本发布与实战教程-v0.02 等
  workflow_dispatch:
    inputs:
      book:
        description: Book directory name (e.g. 1.GitHub版本发布与实战教程)
        required: true
      tag:
        description: Existing version tag, for example 1.GitHub版本发布与实战教程-v0.02
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse book and version from tag / inputs
        id: parse
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # tag format: 1.书名-v0.02  → book=1.书名, version=v0.02
          BOOK="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "book=$BOOK" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate book content
        working-directory: books/${{ steps.parse.outputs.book }}
        run: python3 scripts/validate.py

      - name: Verify tag matches VERSION file
        shell: bash
        run: |
          EXPECTED="$(tr -d '[:space:]' < "books/${{ steps.parse.outputs.book }}/VERSION")"
          if [[ "${{ steps.parse.outputs.version }}" != "$EXPECTED" ]]; then
            echo "ERROR: Tag version (v${{ steps.parse.outputs.version }}) != VERSION file ($EXPECTED)"
            exit 1
          fi

      - name: Create release
        shell: bash
        run: |
          BOOK="${{ steps.parse.outputs.book }}"
          VERSION="${{ steps.parse.outputs.version }}"
          TAG="${{ steps.parse.outputs.tag }}"
          BOOK_DIR="books/${BOOK}"

          # Determine which assets exist
          ASSETS=()
          for f in "${BOOK_DIR}/book/book-v${VERSION}.pdf" "${BOOK_DIR}/book/book-v${VERSION}.md" "${BOOK_DIR}/book/SHA256SUMS.txt"; do
            if [[ -f "$f" ]]; then
              ASSETS+=("$f")
            fi
          done

          NOTES_FILE="${BOOK_DIR}/release-notes/v${VERSION}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            NOTES_FILE=""
          fi

          echo "Creating release: $TAG for $BOOK (v$VERSION)"
          gh release create "$TAG" \
            ${ASSETS[@]+"${ASSETS[@]}"} \
            --title "$BOOK v$VERSION" \
            ${NOTES_FILE:+--notes-file "$NOTES_FILE"} \
            --verify-tag
