name: Publish Release

on:
  push:
    tags:
      - "*-v*" # 匹配 1.GitHub版本发布与实战教程-v0.02 等
  workflow_dispatch:
    inputs:
      book:
        description: Book directory name (e.g. 1.GitHub版本发布与实战教程)
        required: true
      tag:
        description: Existing version tag, for example 1.GitHub版本发布与实战教程-v0.02
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse book and version from tag / inputs
        id: parse
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # tag format: 1.书名-v0.02  → book=1.书名, version=v0.02
          BOOK="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "book=$BOOK" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate book content
        working-directory: books/${{ steps.parse.outputs.book }}
        run: python3 scripts/validate.py

      - name: Verify tag matches VERSION file
        shell: bash
        run: |
          BOOK_DIR="books/${{ steps.parse.outputs.book }}"
          EXPECTED="$(tr -d '[:space:]' < "${BOOK_DIR}/VERSION")"
          if [[ "${{ steps.parse.outputs.version }}" != "$EXPECTED" ]]; then
            echo "ERROR: Tag version (v${{ steps.parse.outputs.version }})"
            echo "!= VERSION file ($EXPECTED)"
            exit 1
          fi

      - name: Create release
        shell: bash
        run: |
          BOOK="${{ steps.parse.outputs.book }}"
          VERSION="${{ steps.parse.outputs.version }}"
          TAG="${{ steps.parse.outputs.tag }}"
          BOOK_DIR="books/${BOOK}"

          # Determine which assets exist
          ASSETS=()
          for ext in pdf md SHA256SUMS.txt; do
            f="${BOOK_DIR}/book/book-v${VERSION}.${ext}"
            # SHA256SUMS.txt has no book-v{version} prefix
            [[ "$ext" == "SHA256SUMS.txt" ]] && \
              f="${BOOK_DIR}/book/SHA256SUMS.txt"
            [[ -f "$f" ]] && ASSETS+=("$f")
          done

          # Release notes: prefer release-notes/v{version}.md, fallback to
          # auto-extract from CHANGELOG.md
          NOTES_FILE="${BOOK_DIR}/release-notes/v${VERSION}.md"
          if [[ ! -f "$NOTES_FILE" ]]; then
            echo "⚠️  release-notes not found, extracting from CHANGELOG..."
            NOTES_FILE=$(mktemp)
            awk -v ver="$VERSION" '
              /^## \[/{
                in_block = (index($0, "[" ver "]") > 0 || \
                            index($0, "[" ver " ") > 0)
              }
              in_block { print }
              /^## \[/ && !(index($0, "[" ver "]") > 0 || \
                            index($0, "[" ver " ") > 0) && in_block { exit }
            ' "${BOOK_DIR}/CHANGELOG.md" > "$NOTES_FILE" 2>/dev/null
            if [[ ! -s "$NOTES_FILE" ]]; then
              NOTES_FILE=""
              echo "⚠️  No changelog entry for v${VERSION}, no release notes"
            fi
          fi

          echo "Creating release: $TAG for $BOOK (v$VERSION)"
          gh release create "$TAG" \
            ${ASSETS[@]+"${ASSETS[@]}"} \
            --title "$BOOK v$VERSION" \
            ${NOTES_FILE:+--notes-file "$NOTES_FILE"} \
            --verify-tag
