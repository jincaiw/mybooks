name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect books
        id: books
        run: |
          BOOKS=$(ls -d books/*/ 2>/dev/null | sed 's|books/||;s|/||' | tr '\n' ' ')
          echo "list=$BOOKS" >> "$GITHUB_OUTPUT"

      - name: Prepare pages for each book
        run: |
          for book in ${{ steps.books.outputs.list }}; do
            echo "=== Preparing pages for $book ==="
            cd "books/$book"
            python3 scripts/prepare_pages.py || echo "⚠️  $book skipped (incomplete content)"
            cd "${{ github.workspace }}"
          done

      - name: Assemble site into ./docs
        run: |
          mkdir -p docs
          for book in ${{ steps.books.outputs.list }}; do
            if [ -d "books/$book/docs" ]; then
              mkdir -p "docs/$book"
              cp -r "books/$book/docs/"* "docs/$book/"
            fi
          done

      - name: Create root index page
        run: |
          cat > docs/index.md << 'INDEXEOF'
---
layout: default
title: MyBook - 书籍列表
---

# MyBook 书籍列表

INDEXEOF
          for book in ${{ steps.books.outputs.list }}; do
            TITLE=$(head -1 "books/$book/README.md" 2>/dev/null | sed 's/^# *//' || echo "$book")
            echo "- [$TITLE](${book}/)" >> docs/index.md
          done
          echo "" >> docs/index.md

      - name: Create root _config.yml for Jekyll
        run: |
          cat > docs/_config.yml << 'CONFIG'
title: MyBook
description: A collection of books
theme: jekyll-theme-cayman
lang: zh-CN
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
CONFIG

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          source: docs

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
