name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - id: books
        run: |
          books=$(ls -d books/*/ 2>/dev/null | sed 's|books/||;s|/||' | tr '\n' ' ')
          echo "list=$books" >> "$GITHUB_OUTPUT"

      - run: |
          for b in ${{ steps.books.outputs.list }}; do
            echo "Preparing $b"
            cd "books/$b"
            python3 scripts/prepare_pages.py || true
            cd "$GITHUB_WORKSPACE"
          done
        name: Prepare pages

      - run: |
          mkdir -p docs
          for b in ${{ steps.books.outputs.list }}; do
            d="books/$b/docs"
            if [ -d "$d" ]; then
              mkdir -p "docs/$b"
              cp -r "$d/"* "docs/$b/"
            fi
          done
        name: Assemble site

      - run: |
          printf '%s\n' \
            '---' 'layout: default' \
            'title: MyBook' '---' \
            '' '# MyBook' '' > docs/index.md
          for b in ${{ steps.books.outputs.list }}; do
            printf -- '- [%s](%s/)\n' "$b" "$b" >> docs/index.md
          done
        name: Create index

      - run: |
          printf '%s\n' 'title: MyBook' \
            'theme: jekyll-theme-cayman' \
            'lang: zh-CN' > docs/_config.yml
        name: Jekyll config

      - uses: actions/configure-pages@v5
        with:
          static_site_generator: jekyll

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v4

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
