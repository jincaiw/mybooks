name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect books
        id: books
        run: |
          BOOKS=$(ls -d books/*/ 2>/dev/null | sed 's|books/||;s|/||' | tr '\n' ' ')
          echo "list=$BOOKS" >> "$GITHUB_OUTPUT"

      - name: Prepare pages for each book
        run: |
          for book in ${{ steps.books.outputs.list }}; do
            echo "=== Preparing pages for $book ==="
            cd "books/$book"
            python3 scripts/prepare_pages.py || echo "⚠️  $book skipped (incomplete content)"
            cd "${{ github.workspace }}"
          done

      - name: Assemble site
        run: |
          mkdir -p _site
          for book in ${{ steps.books.outputs.list }}; do
            mkdir -p "_site/$book"
            cp -r "books/$book/docs/"* "_site/$book/"
          done

      - name: Create root index
        run: |
          cat > _site/index.md << 'INDEX'
---
layout: default
title: MyBook - 书籍列表
---

# MyBook 书籍列表

INDEX
          for book in ${{ steps.books.outputs.list }}; do
            TITLE=$(head -1 "books/$book/README.md" 2>/dev/null | sed 's/^# *//' || echo "$book")
            echo "- [$TITLE](${book}/)" >> _site/index.md
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          source: _site

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site
          destination: ./_site_out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site_out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
