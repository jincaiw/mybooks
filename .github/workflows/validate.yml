name: Validate Books

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  list-books:
    runs-on: ubuntu-latest
    outputs:
      books: ${{ steps.list.outputs.books }}
    steps:
      - uses: actions/checkout@v7
      - id: list
        run: |
          BOOKS=$(ls -d books/*/ 2>/dev/null | sed 's|books/||;s|/||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "books=$BOOKS" >> "$GITHUB_OUTPUT"

  validate:
    needs: list-books
    strategy:
      matrix:
        book: ${{ fromJSON(needs.list-books.outputs.books) }}
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Validate ${{ matrix.book }}
        working-directory: books/${{ matrix.book }}
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ -f "book/book-v${VERSION}.md" ] && [ -f "book/book-v${VERSION}.pdf" ]; then
            python3 scripts/validate.py
          else
            echo "🔧 ${{ matrix.book }}: 内容不完整，宽容模式验证..."
            python3 scripts/validate.py --allow-missing
          fi
